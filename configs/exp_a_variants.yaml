# Goal (a): compare vanilla vs RAG variants on standard multi-hop / factual QA.
# Start with a tiny slice to smoke the comparison, then raise `slice` to medium scale.
name: exp_a_variants
seed: 42
provider:
  llm:
    backend: deepseek
    model: deepseek-chat
    seed: 42
  embeddings:
    backend: local
    model: BAAI/bge-m3
    device: auto
  rerank:
    backend: local
    model: BAAI/bge-reranker-v2-m3
    device: auto
  cache: true
systems:
  - name: vanilla
    chunk_size: 512
    chunk_overlap: 64
    top_k: 5
  - name: rerank
    top_k_retrieve: 20
    top_k_final: 5
  - name: hyde
    variant: rag_fusion
    n_queries: 4
    rrf_k: 60
    top_k: 5
  - name: lightrag
    top_k: 5
datasets:
  - name: hotpotqa
    split: validation
    slice: 50          # raise to ~2000 for the real run
  - name: musique
    split: validation
    slice: 50          # raise to ~1000 for the real run
metrics: [em, f1, recall@5, ndcg@10, mrr, faithfulness, context_precision, context_recall, answer_relevancy]
run:
  repeats: 1
  output_dir: runs/
  concurrency: 8
